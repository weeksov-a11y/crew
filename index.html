<!DOCTYPE html>
<html>
<head>
    <title>PNW Mobile Fishing Crew</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="app_icon.png">
    <link rel="apple-touch-icon" href="app_icon.png">
    
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <h2>🎣 PNW Mobile Fishing Crew</h2>
        <div class="spinner"></div>
        <p style="color: #888;">Locking satellite coordinates...</p>
    </div>

    <script>
        // Wait exactly 2 seconds so Android has time to grab the icon, then jump!
        setTimeout(function() {
            window.location.href = "https://fishing-guide.streamlit.app";
        }, 2000);
    </script>
</body>
</html>
